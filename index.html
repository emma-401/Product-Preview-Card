<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Mentor | Product preview card component</title>
    <link rel="icon" type="image/png" href="images/favicon-32x32.png">

   <!-- link of google fonts type "Montserrat" and "Fraunces" -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <main>
    <div class="product-card">
        
        <div class="product-image">
           <picture>
             <source media="(min-width: 768px)" srcset="./images/image-product-desktop.jpg">
             <img src="./images/image-product-mobile.jpg" alt="Product Mobile image" class="mobile-image">
           </picture>
        </div>

        <div class="product-info">
    <h3>Perfume</h3>
    <h1>Gabrielle Essence Eau De Parfum</h1>
    <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>

        <div class="price-cart">
  <span class="current-price">$149.99</span>
  <span class="old-price">$169.99</span>
        </div>

  <button class="cart-btn" type="submit">
    <img src="./images/icon-cart.svg" alt="cart-icon">
     Add to Cart
  </button>
     </div>
  
    </div>
    </main>

  <footer class="attribution">
   <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. </p>
    <p>Coded by <a href="#">Ogbu Emmanuella Kosisochukwu</a>. </p>
  </footer>

</body>
</html>
